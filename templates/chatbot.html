<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Companion — Dilse.ai</title>
  <meta name="description" content="Chat with your AI companion for mental clarity, motivation, and reflections." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<div class="page-wrapper">

  <!-- Navigation -->
  <nav class="top-nav fade-up">
    <div class="logo">dilse.ai</div>
    <div class="nav-links">
      <a href="{{ url_for('index') }}"><i class="fas fa-home"></i> Home</a>
      <a href="{{ url_for('entries') }}"><i class="fas fa-book"></i> Journal</a>
      <a href="{{ url_for('chatbot') }}" class="active"><i class="fas fa-robot"></i> Chatbot</a>
      <a href="{{ url_for('chart') }}"><i class="fas fa-chart-area"></i> Insights</a>
    </div>
  </nav>

  <!-- Chat -->
  <div class="chat-container fade-up delay-1">
    <div class="chat-header">
      <h2><i class="fas fa-robot" style="color:var(--accent-light);margin-right:8px;"></i> AI Companion</h2>
      <p class="subtitle" style="margin:8px auto 0; font-size:0.88rem;">Ask questions, get reflections, or simply talk. I'm here for you.</p>
      <div class="online-badge"><span class="dot"></span> Online</div>
    </div>

    <div class="chat-messages" id="chat">
      <div class="chat-bubble bot">
        Hey there! 👋 I'm your Dilse AI companion. How are you feeling today? I'm here to chat and brighten your day.
      </div>
    </div>

    <div class="chat-input-area">
      <input type="text" id="user-input" class="form-control" placeholder="Type your message…" autocomplete="off" />
      <button class="btn btn-primary btn-icon" id="send-btn" title="Send">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>

</div>

<script>
  const chat = document.getElementById('chat');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  const OPENROUTER_API_KEY = 'YOUR_API_KEY_HERE';

  function appendMessage(sender, text) {
    const bubble = document.createElement('div');
    bubble.classList.add('chat-bubble', sender);
    bubble.textContent = text;
    chat.appendChild(bubble);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const bubble = document.createElement('div');
    bubble.classList.add('chat-bubble', 'bot');
    bubble.id = 'typing-indicator';
    bubble.innerHTML = '<i class="fas fa-circle-notch fa-spin" style="color:var(--text-muted);"></i>';
    chat.appendChild(bubble);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;

    appendMessage('user', message);
    userInput.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + OPENROUTER_API_KEY
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            { role: 'system', content: 'You are a warm, empathetic AI companion that supports users emotionally. Keep responses concise, friendly, and encouraging. Use occasional emojis.' },
            { role: 'user', content: message }
          ]
        })
      });

      if (!response.ok) throw new Error('API error: ' + response.statusText);

      const data = await response.json();
      const botReply = data.choices?.[0]?.message?.content || 'Sorry, I didn\'t get that. Could you try again?';
      removeTyping();
      appendMessage('bot', botReply);
    } catch (error) {
      removeTyping();
      appendMessage('bot', 'Connection error — please try again later.');
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  userInput.focus();
</script>

</body>
</html>
